<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Borrowers | Bike Management System</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container">

    <!-- LEFT SIDEBAR -->

    <aside class="sidebar">

        <div class="logo">
            <h3>Management App v1.0</h3>
            <p>Bike Management System</p>
        </div>

        <nav class="menu">

            <a href="index.html">🏠 Dashboard</a>

            <a href="borrowers.html" class="active">
                👤 Borrowers
            </a>

            <a href="assets.html">🚚 Assets</a>

            <a href="loans.html">💳 Loans</a>

            <a href="payments.html">💰 Payments</a>

            <a href="reports.html">📊 Reports</a>

            <a href="admin.html">⚙️ Admin</a>

            <a href="api-docs.html">📘 API Docs</a>

        </nav>

    </aside>

    <!-- RIGHT CONTENT -->

    <main class="content">

        <h1>👤 Driver / Borrower Registration</h1>

        <form>

            <h2>Personal Information</h2>

            <div class="grid">

                <div>
                    <label>Full Name</label>
                    <input type="text">
                </div>

                <div>
                    <label>National ID / Passport</label>
                    <input type="text">
                </div>

                <div>
                    <label>Age</label>
                    <input type="number">
                </div>

                <div>
                    <label>Date of Birth</label>
                    <input type="date">
                </div>

                <div>
                    <label>Gender</label>

                    <select>

                        <option>Male</option>
                        <option>Female</option>

                    </select>

                </div>

                <div>
                    <label>Phone Number</label>
                    <input type="tel">
                </div>

                <div>
                    <label>Email Address</label>
                    <input type="email">
                </div>

                <div>
                    <label>District / City</label>
                    <input type="text">
                </div>

                <div>
                    <label>Village / Address</label>
                    <input type="text">
                </div>

            </div>

            <h2>Driver Details</h2>

            <div class="grid">

                <div>
                    <label>Driving Permit Number</label>
                    <input type="text">
                </div>

                <div>
                    <label>License Class</label>

                    <select>

                        <option>A</option>
                        <option>B</option>
                        <option>C</option>
                        <option>D</option>
                        <option>E</option>

                    </select>

                </div>

                <div>
                    <label>Permit Issue Date</label>
                    <input type="date">
                </div>

                <div>
                    <label>Permit Expiry Date</label>
                    <input type="date">
                </div>

                <div>
                    <label>Driving Experience (Years)</label>
                    <input type="number">
                </div>

            </div>

            <h2>Employment</h2>

            <div class="grid">

                <div>
                    <label>Employer</label>
                    <input type="text">
                </div>

                <div>
                    <label>Occupation</label>
                    <input type="text">
                </div>

                <div>
                    <label>Monthly Income</label>
                    <input type="number">
                </div>

            </div>

            <h2>Uploads</h2>

            <div class="grid">

                <div>
                    <label>Profile Picture</label>
                    <input type="file">
                </div>

                <div>
                    <label>Driving Permit</label>
                    <input type="file">
                </div>

                <div>
                    <label>National ID Copy</label>
                    <input type="file">
                </div>

                <div>
                    <label>Proof of Residence</label>
                    <input type="file">
                </div>

            </div>

            <h2>Fleet Financing</h2>

            <div class="grid">

                <div>
                    <label>Requested Loan Amount</label>
                    <input type="number">
                </div>

                <div>
                    <label>Purpose</label>
                    <input type="text">
                </div>

                <div>
                    <label>Notes</label>
                    <textarea rows="5"></textarea>
                </div>

            </div>

            <br>

            <button type="submit">💾 Save Borrower</button>

            <button type="reset">🔄 Reset</button>

        </form>

    </main>

</div>

</body>

</html>

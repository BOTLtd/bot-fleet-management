<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Borrowers | Vehicle Management Tool v1.0</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI, Arial, sans-serif;
}


body{
    background:#f4f6f9;
}


/* MAIN LAYOUT */

.container{
    display:flex;
    min-height:100vh;
}



/* LEFT SIDEBAR */

.sidebar{

    width:260px;
    background:#0f172a;
    color:white;
    min-height:100vh;

}


/* =============================
   RESPONSIVE DESIGN
============================= */

/* Tablets */

@media (max-width: 992px){

    .sidebar{
        width:220px;
    }

    .content{
        padding:20px;
    }

    .features{
        grid-template-columns:repeat(2,1fr);
    }

    .cards{
        grid-template-columns:repeat(2,1fr);
    }

}


/* Phones */

@media (max-width:768px){

    .container{
        flex-direction:column;
    }

    .sidebar{

        width:100%;
        height:auto;

    }

    .logo{

        padding:20px;

    }

    .logo-link h3{

        font-size:20px;

    }

    .logo-link p{

        font-size:12px;

    }

    .menu{

        display:flex;
        flex-wrap:wrap;
        justify-content:center;
        margin:0;
    }

    .menu a{

        flex:1 1 45%;
        text-align:center;
        padding:15px;
        font-size:15px;

    }

    .content{

        padding:15px;

    }

    .welcome-banner{

        padding:25px;

    }

    .welcome-banner h2{

        font-size:22px;

    }

    .welcome-banner p{

        font-size:14px;

    }

    .features{

        grid-template-columns:1fr;

    }

    .cards{

        grid-template-columns:1fr;

    }

    .grid{

        grid-template-columns:1fr;

    }

}


/* Small Phones */

@media (max-width:480px){

    .menu{

        display:block;

    }

    .menu a{

        width:100%;
        text-align:left;
        padding:15px 20px;
        font-size:14px;

    }

    .logo-link h3{

        font-size:18px;

    }

    .welcome-banner h2{

        font-size:20px;

    }

}
/* ================= LOGO ================= */

.logo{
    text-align:center;
    padding:30px 15px;
    border-bottom:1px solid #334155;
}

/* Make the whole logo clickable */

.logo-link{
    display:block;
    text-decoration:none;
    color:inherit;
    cursor:pointer;
}

.logo-link:link,
.logo-link:visited,
.logo-link:hover,
.logo-link:active{
    text-decoration:none;
    color:inherit;
}

/* Title */

.logo-link h3{
    margin:0;
    color:#38bdf8;
    font-size:22px;
    font-weight:700;
    text-decoration:none;
    transition:color .3s ease;
}

/* Subtitle */

.logo-link p{
    margin-top:6px;
    color:#cbd5e1;
    font-size:13px;
    text-decoration:none;
}

/* Hover effect */

.logo-link:hover h3{
    color:#60a5fa;
}



.menu{

    margin-top:20px;

}



.menu a{

    display:block;
    color:white;
    text-decoration:none;
    padding:16px 25px;
    font-size:16px;
    transition:.3s;

}



.menu a:hover{

    background:#1e293b;

}



.menu a.active{

    background:#2563eb;

}





/* RIGHT CONTENT */

.content{

    flex:1;
    padding:35px;

}



.content h1{

    color:#1e293b;
    margin-bottom:8px;

}



.content p{

    color:#64748b;
    margin-bottom:25px;

}





/* FORM */

.form-container{

    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 5px 20px rgba(0,0,0,.08);

}



.form-container h2{

    margin:25px 0 20px;
    color:#2563eb;
    font-size:20px;

}



.form-grid{

    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:20px;

}



label{

    display:block;
    margin-bottom:7px;
    font-weight:600;
    color:#334155;

}



input,
select,
textarea{

    width:100%;
    padding:12px;
    border:1px solid #cbd5e1;
    border-radius:6px;
    outline:none;

}



input:focus,
select:focus,
textarea:focus{

    border-color:#2563eb;

}




.buttons{

    margin-top:30px;

}



button{

    padding:12px 25px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:15px;
    margin-right:10px;

}



button[type="submit"]{

    background:#2563eb;
    color:white;

}



button[type="reset"]{

    background:#64748b;
    color:white;

}





/* RESPONSIVE */

@media(max-width:900px){

.container{

    flex-direction:column;

}


.sidebar{

    width:100%;
    min-height:auto;

}


.form-grid{

    grid-template-columns:1fr;

}

}

</style>


</head>

</div>



<div>

<input type="date">

</div>



<div>

<input type="date">

</div>



<div>

<label>Years of Driving Experience</label>

<input type="number">

</div>

<input type="text">

<div>

<!-- DOCUMENTS -->

<div class="form-grid">


<div>

<label>National ID Copy</label>

<input type="file">

</div>
